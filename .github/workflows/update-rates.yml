# ============================================================
# TrueRate PH - scheduled auto-updater ("the timer")
#
# This runs update_rates.py automatically on a schedule (no computer of
# yours needs to be on) and commits the refreshed providers.json back to
# the repo. If the site is hosted from this repo (e.g. GitHub Pages), that
# commit redeploys the new rates automatically.
#
# IMPORTANT: this file does nothing until the project is pushed to GitHub.
# It's here and ready so that publishing the site turns automation on.
# You can also run it on demand from the GitHub "Actions" tab.
# ============================================================
name: Update rates

on:
  schedule:
    # Runs daily at 00:00 UTC (08:00 in the Philippines).
    # Change the time by editing this cron value (it's in UTC).
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" clicks in the UI

permissions:
  contents: write         # lets the job commit the updated providers.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh provider rates
        run: python update_rates.py

      - name: Commit the refreshed rates (only if something changed)
        run: |
          git config user.name "TrueRate bot"
          git config user.email "bot@truerate.local"
          git add providers.json
          if git diff --staged --quiet; then
            echo "No rate changes today."
          else
            git commit -m "chore: refresh provider rates"
            git push
          fi
